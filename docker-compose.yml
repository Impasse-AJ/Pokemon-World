services:
  mysql:
    image: mysql:8.4
    container_name: pokemon_world_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - pokemon_world_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: public.ecr.aws/docker/library/phpmyadmin:5.2
    container_name: pokemon_world_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M

  back:
    build:
      context: ./back
    container_name: pokemon_world_back
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACK_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-smtp-relay.brevo.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@pokemon-world.es}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Pokémon World Map}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_SHOW_DEV_CONFIRMATION_URL: ${MAIL_SHOW_DEV_CONFIRMATION_URL:-true}

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: pokemon_world_front
    restart: unless-stopped
    depends_on:
      - back
    ports:
      - "127.0.0.1:${FRONT_PORT:-5173}:5173"

volumes:
  pokemon_world_mysql_data:
