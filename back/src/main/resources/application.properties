spring.application.name=pokemon-world-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3307}/${MYSQL_DATABASE:pokemon_world}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:pokemon_user}
spring.datasource.password=${MYSQL_PASSWORD:pokemon_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

spring.sql.init.mode=never
